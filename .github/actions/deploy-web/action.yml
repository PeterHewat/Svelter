name: Deploy Web to Cloudflare Pages
description: Build and deploy apps/web to Cloudflare Pages (production or staging branch).

inputs:
  convex_deploy_key:
    description: Convex deploy key for codegen
    required: true
  public_convex_url:
    description: PUBLIC_CONVEX_URL for the web build
    required: true
  public_clerk_publishable_key:
    description: PUBLIC_CLERK_PUBLISHABLE_KEY for the web build
    required: true
  cloudflare_api_token:
    description: Cloudflare API token (Pages Edit)
    required: true
  cloudflare_account_id:
    description: Cloudflare account ID
    required: true
  pages_project_name:
    description: Cloudflare Pages project name for apps/web
    required: true
  marketing_pages_project_name:
    description: Cloudflare Pages project name for apps/marketing (marketing site origin)
    required: true
  deploy_branch:
    description: Preview branch label (e.g. staging); omit for production
    required: false
    default: ""
  apex_domain:
    description: Optional apex domain for production custom origins (e.g. foobar.com)
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Build and deploy to Cloudflare Pages (web)
      shell: bash
      env:
        CONVEX_DEPLOY_KEY: ${{ inputs.convex_deploy_key }}
        PUBLIC_CONVEX_URL: ${{ inputs.public_convex_url }}
        PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ inputs.public_clerk_publishable_key }}
        CLOUDFLARE_API_TOKEN: ${{ inputs.cloudflare_api_token }}
        CLOUDFLARE_ACCOUNT_ID: ${{ inputs.cloudflare_account_id }}
        CF_PAGES_PROJECT_WEB: ${{ inputs.pages_project_name }}
        CF_PAGES_PROJECT_MARKETING: ${{ inputs.marketing_pages_project_name }}
        DEPLOY_BRANCH: ${{ inputs.deploy_branch }}
        APEX_DOMAIN: ${{ inputs.apex_domain }}
      run: |
        set -euo pipefail
        if [ -z "${PUBLIC_CONVEX_URL:-}" ]; then
          echo "::error::Web deploy needs PUBLIC_CONVEX_URL."
          exit 1
        fi
        if [ -z "${PUBLIC_CLERK_PUBLISHABLE_KEY:-}" ]; then
          echo "::error::Web deploy needs PUBLIC_CLERK_PUBLISHABLE_KEY."
          exit 1
        fi
        if [ -z "${CONVEX_DEPLOY_KEY:-}" ]; then
          echo "::error::CONVEX_DEPLOY_KEY is required for web deploy (convex/_generated is not committed)."
          exit 1
        fi
        eval "$(bun -e "
        import { deriveAppOrigins } from '@repo/config/app-origins';
        const origins = deriveAppOrigins({
          webProject: process.env.CF_PAGES_PROJECT_WEB ?? '',
          marketingProject: process.env.CF_PAGES_PROJECT_MARKETING ?? '',
          stagingBranch: process.env.DEPLOY_BRANCH?.trim() || undefined,
          apexDomain: process.env.APEX_DOMAIN?.trim() || undefined,
        });
        console.log('export PUBLIC_MARKETING_ORIGIN=' + JSON.stringify(origins.marketing));
        ")"
        bun scripts/generate-convex.ts
        bun run --filter @repo/web build
        BRANCH_ARGS=()
        if [ -n "${DEPLOY_BRANCH:-}" ]; then
          BRANCH_ARGS=(--branch="$DEPLOY_BRANCH")
        fi
        bunx wrangler pages deploy apps/web/build \
          --project-name="$CF_PAGES_PROJECT_WEB" \
          "${BRANCH_ARGS[@]}" \
          --commit-hash="${GITHUB_SHA}" \
          --commit-message="${GITHUB_REF_NAME:-$GITHUB_SHA}"
