name: Deploy Marketing to Cloudflare Pages
description: Build and deploy apps/marketing to Cloudflare Pages (production or staging branch).

inputs:
  cloudflare_api_token:
    description: Cloudflare API token (Pages Edit)
    required: true
  cloudflare_account_id:
    description: Cloudflare account ID
    required: true
  pages_project_name:
    description: Cloudflare Pages project name for apps/marketing
    required: true
  web_pages_project_name:
    description: Cloudflare Pages project name for apps/web (product app origin)
    required: true
  deploy_branch:
    description: Preview branch label (e.g. staging); omit for production
    required: false
    default: ""
  apex_domain:
    description: Optional apex domain for production custom origins (e.g. foobar.com)
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Build and deploy to Cloudflare Pages (marketing)
      shell: bash
      env:
        CLOUDFLARE_API_TOKEN: ${{ inputs.cloudflare_api_token }}
        CLOUDFLARE_ACCOUNT_ID: ${{ inputs.cloudflare_account_id }}
        CF_PAGES_PROJECT_MARKETING: ${{ inputs.pages_project_name }}
        CF_PAGES_PROJECT_WEB: ${{ inputs.web_pages_project_name }}
        DEPLOY_BRANCH: ${{ inputs.deploy_branch }}
        APEX_DOMAIN: ${{ inputs.apex_domain }}
      run: |
        set -euo pipefail
        eval "$(bun -e "
        import { deriveAppOrigins } from '@repo/config/app-origins';
        const origins = deriveAppOrigins({
          webProject: process.env.CF_PAGES_PROJECT_WEB ?? '',
          marketingProject: process.env.CF_PAGES_PROJECT_MARKETING ?? '',
          stagingBranch: process.env.DEPLOY_BRANCH?.trim() || undefined,
          apexDomain: process.env.APEX_DOMAIN?.trim() || undefined,
        });
        console.log('export PUBLIC_PRODUCT_APP_URL=' + JSON.stringify(origins.product));
        console.log('export PUBLIC_MARKETING_ORIGIN=' + JSON.stringify(origins.marketing));
        ")"
        bun run --filter @repo/marketing build
        BRANCH_ARGS=()
        if [ -n "${DEPLOY_BRANCH:-}" ]; then
          BRANCH_ARGS=(--branch="$DEPLOY_BRANCH")
        fi
        bunx wrangler pages deploy apps/marketing/build \
          --project-name="$CF_PAGES_PROJECT_MARKETING" \
          "${BRANCH_ARGS[@]}" \
          --commit-hash="${GITHUB_SHA}" \
          --commit-message="${GITHUB_REF_NAME:-$GITHUB_SHA}"
