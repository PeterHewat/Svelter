name: Continuous Integration

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GITLEAKS_VERSION: "8.30.1"
  CONVEX_CI_TESTS: true

jobs:
  checks:
    name: CI checks
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.detect.outputs.web }}
      marketing: ${{ steps.detect.outputs.marketing }}
      convex: ${{ steps.detect.outputs.convex }}
      shared: ${{ steps.detect.outputs.shared }}
      config: ${{ steps.detect.outputs.config }}
      any: ${{ steps.detect.outputs.any }}
      docs_only: ${{ steps.detect.outputs.docs_only }}
      convex_ci_tests: ${{ steps.ci-flags.outputs.convex_ci_tests }}
    steps:
      - id: ci-flags
        run: echo "convex_ci_tests=${{ env.CONVEX_CI_TESTS }}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed projects
        id: detect
        run: |
          export CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }} 2>/dev/null || echo "")

          echo "Changed files:"
          echo "$CHANGED_FILES"

          bash scripts/ci-detect-changes.sh

      - uses: ./.github/actions/setup-bun

      - name: Run security audit
        run: bun audit --audit-level=high

      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_VERSION: ${{ env.GITLEAKS_VERSION }}

      - name: Format and check
        if: |
          steps.detect.outputs.any == 'true' ||
          steps.detect.outputs.docs_only == 'true'
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
          ANY_CHANGED: ${{ steps.detect.outputs.any }}
        run: |
          set -euo pipefail
          bun run format
          if [ "${ANY_CHANGED}" != "true" ]; then
            exit 0
          fi
          if [ -z "${CONVEX_DEPLOY_KEY:-}" ]; then
            echo "::error::CONVEX_DEPLOY_KEY is required for check (codegen + typecheck). See docs/ci-cd.md#repository-secrets"
            exit 1
          fi
          bun run check

  web:
    name: Web build & test
    runs-on: ubuntu-latest
    needs: checks
    if: needs.checks.outputs.web == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
      - name: Build and test web app
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
          PUBLIC_CONVEX_URL: https://ci-placeholder.convex.cloud
        run: |
          set -euo pipefail
          if [ -z "${CONVEX_DEPLOY_KEY:-}" ]; then
            echo "::error::CONVEX_DEPLOY_KEY is required for web build and tests. See docs/ci-cd.md#repository-secrets"
            exit 1
          fi
          bun scripts/generate-convex.ts
          bun run --filter @repo/web build
          bun run --filter @repo/web test:coverage
          bun run --filter @repo/ui-svelte test:coverage
          bun run --filter @repo/utils test:coverage
          bun run --filter @repo/utils test:integration

  marketing:
    name: Marketing build & test
    runs-on: ubuntu-latest
    needs: checks
    if: needs.checks.outputs.marketing == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
      - name: Build and test marketing site
        run: |
          set -euo pipefail
          bun run --filter @repo/marketing build
          bun run --filter @repo/marketing test:coverage

  packages:
    name: Package tests
    runs-on: ubuntu-latest
    needs: checks
    if: |
      needs.checks.outputs.shared == 'true' ||
      needs.checks.outputs.config == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
      - name: Run shared package tests
        run: bun run --filter @repo/config test:coverage && bun run --filter @repo/env-core test:coverage

  convex:
    name: Convex tests
    runs-on: ubuntu-latest
    needs: checks
    if: needs.checks.outputs.convex == 'true' && needs.checks.outputs.convex_ci_tests == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
      - name: Convex tests
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${CONVEX_DEPLOY_KEY:-}" ]; then
            echo "::error::CONVEX_DEPLOY_KEY is required for Convex tests. See docs/ci-cd.md#repository-secrets"
            exit 1
          fi
          bun scripts/generate-convex.ts
          bun run --filter @repo/convex test:coverage

  required:
    name: CI required
    runs-on: ubuntu-latest
    needs:
      - checks
      - web
      - marketing
      - packages
      - convex
    if: always() && !cancelled()
    steps:
      - uses: actions/checkout@v6
      - name: Verify required jobs
        env:
          ANY: ${{ needs.checks.outputs.any }}
          WEB: ${{ needs.checks.outputs.web }}
          MARKETING: ${{ needs.checks.outputs.marketing }}
          CONVEX: ${{ needs.checks.outputs.convex }}
          SHARED: ${{ needs.checks.outputs.shared }}
          CONFIG: ${{ needs.checks.outputs.config }}
          DOCS_ONLY: ${{ needs.checks.outputs.docs_only }}
          CONVEX_CI_TESTS: ${{ needs.checks.outputs.convex_ci_tests }}
          CHECKS_RESULT: ${{ needs.checks.result }}
          WEB_RESULT: ${{ needs.web.result }}
          MARKETING_RESULT: ${{ needs.marketing.result }}
          PACKAGES_RESULT: ${{ needs.packages.result }}
          CONVEX_RESULT: ${{ needs.convex.result }}
        run: bash scripts/ci-verify-required.sh
